# CI do PROJETO ADOTANTE: enxuto e portatil.
# O template ja entrega este workflow + bin/critique-gate-ci.sh, mas o
# branch protection (required check `gate`, exigir PR e bloquear force-push na
# branch default) continua sendo passo manual no GitHub do adotante.
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: >
          shellcheck .engrama/scripts/*.sh
          .engrama/githooks/pre-commit bin/critique-gate-ci.sh

      - name: Run Engrama lint
        run: bash ./.engrama/scripts/lint.sh

      - name: Fetch pull request base
        if: github.event_name == 'pull_request'
        run: >
          git fetch --no-tags origin
          "refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Re-run critique gate against pull request diff
        if: github.event_name == 'pull_request'
        env:
          ENGRAMA_REQUIRE_DIFF_BIND: "1"
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE_REF: origin/${{ github.base_ref }}
          PR_FILES: ${{ runner.temp }}/critique-gate-pr-files.zlist
        run: |
          git diff --name-only -z "origin/${{ github.base_ref }}...HEAD" > "$PR_FILES"
          bash ./bin/critique-gate-ci.sh --branch "$PR_BRANCH" --base-ref "$PR_BASE_REF" --files-from "$PR_FILES"

      - name: Notice on multi-commit diff-binding
        if: always() && github.event_name == 'pull_request'
        run: |
          commit_count="$(git rev-list --count "origin/${{ github.base_ref }}..HEAD" 2>/dev/null || echo 0)"
          if [ "$commit_count" -gt 1 ]; then
            echo "::notice::Diff-binding cobre o diff cumulativo do PR (base...HEAD); squash/1 commit por PR e o fluxo recomendado. PR multi-commit continua valido, mas o fingerprint cobre o conjunto."
          fi

  markdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md

  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          version="8.30.1"
          asset="gitleaks_${version}_linux_x64.tar.gz"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${version}"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          curl -sSfL "${base_url}/${asset}" -o "$tmpdir/$asset"
          curl -sSfL "${base_url}/gitleaks_${version}_checksums.txt" -o "$tmpdir/checksums.txt"
          (
            cd "$tmpdir"
            grep " ${asset}\$" checksums.txt | sha256sum -c -
          )
          mkdir -p "$RUNNER_TEMP/gitleaks-bin"
          tar -xzf "$tmpdir/$asset" -C "$RUNNER_TEMP/gitleaks-bin" gitleaks

      - name: Secret scan
        run: |
          set -euo pipefail
          "$RUNNER_TEMP/gitleaks-bin/gitleaks" git --redact --no-banner -v .

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install shellcheck on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install shellcheck on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Run shellcheck
        run: >
          shellcheck critique-gate-ci.sh engrama-diff-hash.sh install.sh bootstrap.sh lint.sh .engrama/scripts/*.sh
          .engrama/githooks/pre-commit tests/run.sh tests/gate/*.test.sh
          tests/contract/*.test.sh

      - name: Run Engrama lint
        run: bash lint.sh

      - name: Run test suite
        run: bash tests/run.sh

      - name: Fetch pull request base
        if: github.event_name == 'pull_request'
        run: >
          git fetch --no-tags origin
          "refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Re-run critique gate against pull request diff
        if: github.event_name == 'pull_request'
        env:
          ENGRAMA_REQUIRE_DIFF_BIND: "1"
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE_REF: origin/${{ github.base_ref }}
          PR_FILES: ${{ runner.temp }}/critique-gate-pr-files.zlist
        run: |
          git diff --name-only -z "origin/${{ github.base_ref }}...HEAD" > "$PR_FILES"
          bash ./critique-gate-ci.sh --branch "$PR_BRANCH" --base-ref "$PR_BASE_REF" --files-from "$PR_FILES"

  markdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md

  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
